name: update-days
on:
  schedule:
    - cron: "0 0 * * *" # Spustí se přesně ve 0:00 UTC (což jsou 2:00 ráno našeho času)
  workflow_dispatch:

jobs:
  update-days:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Spocitat dny
      run: |
        # Vynutíme české časové pásmo pro správný výpočet dne
        export TZ="Europe/Prague"
        
        TARGET=$(date -d "2026-07-19" +%s)
        CURRENT=$(date -d "today 00:00:00" +%s)
        DIFF=$(( (TARGET - CURRENT) / 86400 ))
        echo "{\"days\": $DIFF}" > dovca.json

    - name: Ulozit zmeny na GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automaticky odpocet"
        file_pattern: 'dovca.json'
