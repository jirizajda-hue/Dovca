name: update-ionq
on:
  schedule:
    - cron: "0 * * * 1-5" # Spustí se každou celou hodinu od pondělí do pátku
  workflow_dispatch:

jobs:
  update-ionq:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Instalovat jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Stahnout realnou cenu s Pre/Post marketem
      run: |
        API_KEY="I6S6OS5NEXR4EU40"
        
        # Alpha Vantage s funkcí GLOBAL_QUOTE vrací nejnovější cenu (přes den živou, v noci finální po zavření aftermarketu)
        JSON_DATA=$(curl -s "https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=IONQ&apikey=$API_KEY")
        
        CENA_AKCIE=$(echo "$JSON_DATA" | jq -r '."Global Quote"."05. price" // empty')
        
        if [ -z "$CENA_AKCIE" ] || [ "$CENA_AKCIE" = "null" ]; then
          CENA_AKCIE="0.00"
        fi
        
        IONQ_PRICE=$(printf "%.2f" $CENA_AKCIE)
        echo "{\"cena\": $IONQ_PRICE}" > ionq.json

    - name: Ulozit do ionq.json
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Aktualizace ceny pres Alpha Vantage"
        file_pattern: 'ionq.json'
